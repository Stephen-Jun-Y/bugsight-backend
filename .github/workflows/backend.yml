name: BugSight Backend CI/CD

on:
  push:
    branches: [ main ]
    paths:
      - 'src/**'
      - 'pom.xml'
      - 'bugsight-backend.service'
      - '.github/workflows/backend.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'src/**'
      - 'pom.xml'
      - '.github/workflows/backend.yml'

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn clean package -DskipTests -q

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: bugsight-backend-jar
          path: target/bugsight-backend.jar
          retention-days: 1

  deploy:
    name: Deploy to Tencent Cloud
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Download JAR artifact
        uses: actions/download-artifact@v4
        with:
          name: bugsight-backend-jar

      - name: Upload JAR to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          source: "bugsight-backend.jar"
          target: "/tmp/bugsight-deploy/"
          timeout: 120s
          overwrite: true

      - name: Restart backend service
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            set -e
            sudo mkdir -p /opt/bugsight
            sudo install -o bugsight -g bugsight -m 644 /tmp/bugsight-deploy/bugsight-backend.jar /opt/bugsight/bugsight-backend.jar
            rm -f /tmp/bugsight-deploy/bugsight-backend.jar
            if [ ! -f /etc/systemd/system/bugsight-backend.service ]; then
              echo "Service not found, creating from current repo template..."
              sudo cp /opt/bugsight/source/bugsight-backend.service /etc/systemd/system/bugsight-backend.service
              sudo systemctl daemon-reload
              sudo systemctl enable bugsight-backend
            fi
            sudo systemctl restart bugsight-backend
            sleep 5
            sudo systemctl status bugsight-backend --no-pager
